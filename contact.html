<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portfolio | Contact</title>
    <!-- Linking Shared External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Semantic Header & Navigation -->
    <header>
        <nav>
            <div class="logo">StudentHub</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Academic Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content Container -->
    <main class="contact-container">
        <section class="contact-intro">
            <h1>Get In Touch</h1>
            <p>Have a question or want to collaborate on a technical project? Send me a message using the form below.</p>
        </section>

        <!-- Interactive Contact Form Architecture -->
        <section class="contact-card">
            <!-- Dynamic Alert Box for JS Messages -->
            <div id="form-alert" class="form-alert"></div>

            <form id="contact-form" novalidate>
                <div class="form-group">
                    <label for="user-name">Full Name</label>
                    <input type="text" id="user-name" placeholder="Enter your full name">
                    <small class="error-msg" id="name-error"></small>
                </div>

                <div class="form-group">
                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" placeholder="name@example.com">
                    <small class="error-msg" id="email-error"></small>
                </div>

                <div class="form-group">
                    <label for="user-subject">Subject</label>
                    <input type="text" id="user-subject" placeholder="What is this regarding?">
                    <small class="error-msg" id="subject-error"></small>
                </div>

                <div class="form-group">
                    <label for="user-message">Your Message</label>
                    <textarea id="user-message" rows="6" placeholder="Type your message details here..."></textarea>
                    <small class="error-msg" id="message-error"></small>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </section>
    </main>

    <!-- Semantic Footer -->
    <footer>
        <p>&copy; 2026 Nnamdi Anyanwu. All Rights Reserved.</p>
    </footer>

    <!-- Linking Form Validation Logic -->
    <script src="validation.js"></script>
</body>
</html>
